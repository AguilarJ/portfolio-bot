name: Daily Portfolio Scan

on:
  schedule:
    # 19:59 UTC = 3:59 PM EDT / 12:59 PM PDT
    - cron: '59 19 * * 1-5'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    env:
      # Forces GitHub to use the newest Node.js to hide that warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # <-- UPDATED to v4

    # 1. DOWNLOAD DATABASE (if it exists from yesterday)
    - name: Download Database Artifact
      uses: actions/download-artifact@v4
      continue-on-error: true # <-- Kept this at the step level
      with:
        name: portfolio-db
        path: .
        # (Removed the duplicate continue-on-error from inside 'with')

    - name: Set up Python
      uses: actions/setup-python@v5 # <-- UPDATED to v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Portfolio Bot
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python portfolio_manager.py

    # 2. UPLOAD DATABASE (Save it for tomorrow)
    - name: Upload Database Artifact
      uses: actions/upload-artifact@v4
      with:
        name: portfolio-db
        path: portfolio.db
        retention-days: 90